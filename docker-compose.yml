services:
  php:
    build:
      context: .
      dockerfile_inline: |
        FROM php:8.3-apache
        # Instala dependências para ler Excel e manipular arquivos
        RUN apt-get update && apt-get install -y libpng-dev libzip-dev zip unzip
        RUN docker-php-ext-install gd zip
        # ADICIONADO: pdo_mysql para conexão com banco
        RUN docker-php-ext-install gd zip pdo_mysql
        # Instala o Composer
        COPY --from=composer:latest /usr/bin/composer /usr/bin/composer
    container_name: php_app
    ports:
      - "8080:80"
    volumes:
      - C:/samara_php:/var/www/html
    restart: always

  db:
    image: mariadb:11
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: samara
      MYSQL_USER: samara
      MYSQL_PASSWORD: samara
    ports:
      - "3306:3306"
    volumes:
      # Os dados do banco ficarão nesta pasta no seu Windows
      - C:/samara_php/db_data:/var/lib/mysql
    restart: always

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    restart: always
